name: Tests GG Nameforge

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sintaxis de todos los módulos
        run: for f in scripts/*.mjs; do node --check "$f"; done
      - name: Harness (mocks de Foundry, sin dependencias)
        run: node tests/run.mjs
